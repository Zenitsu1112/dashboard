<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL_ACCESS // SAHIBGANJ_REGISTRY</title>
    <style>
        :root { --neon: #00ff41; --bg: #050505; --font: 'Courier New', monospace; --accent: #60a5fa; }
        body { background: var(--bg); color: var(--neon); font-family: var(--font); margin: 0; padding: 20px; display: flex; flex-direction: column; height: 100vh; overflow: hidden; box-sizing: border-box; }
        #output { flex-grow: 1; overflow-y: auto; margin-bottom: 20px; white-space: pre-wrap; line-height: 1.6; }
        .input-area { display: flex; border-top: 1px solid #113311; padding-top: 10px; }
        #cmd { background: transparent; border: none; color: var(--neon); font-family: var(--font); font-size: 1rem; flex-grow: 1; outline: none; }
        .subject-card { border-left: 3px solid #113311; padding: 8px 15px; margin: 8px 0; cursor: pointer; background: rgba(0, 255, 65, 0.02); }
        .subject-card:hover { background: rgba(0, 255, 65, 0.1); border-left: 3px solid var(--neon); }
        #dossier-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); z-index: 100; justify-content: center; align-items: center; }
        .dossier-card { background: #0a0a0a; border: 1px solid var(--neon); width: 90%; max-width: 500px; padding: 30px; position: relative; box-shadow: 0 0 20px rgba(0,255,65,0.2); }
        .close-btn { position: absolute; top: 10px; right: 15px; cursor: pointer; }
        .status-tag { padding: 2px 10px; font-size: 0.7rem; background: #700; color: #fff; margin-left: 10px; vertical-align: middle; }
        hr { border: 0; border-top: 1px solid #222; margin: 15px 0; }
    </style>
</head>
<body>

    <div id="output">> [ INITIALIZING_SAHIBGANJ_SECURE_HUB ]
> [ STATUS: WAITING_FOR_MANIFEST ]</div>

    <div class="input-area">
        <span style="color:#555; margin-right:10px;">nimo@bunker:~$</span>
        <input type="text" id="cmd" autofocus autocomplete="off">
    </div>

    <div id="dossier-overlay">
        <div class="dossier-card">
            <span class="close-btn" onclick="closeDossier()">[ CLOSE ]</span>
            <h2 id="d-name"></h2><span class="status-tag">VERIFIED_DATA</span>
            <p><strong>FATHER/ASSOCIATE:</strong> <span id="d-father"></span></p>
            <p><strong>LOCATION:</strong> <span id="d-loc" style="color: var(--accent);"></span></p>
            <p><strong>ROLE:</strong> <span id="d-role"></span></p>
            <p><strong>CONTACT/ID:</strong> <span id="d-id"></span></p>
            <hr>
            <p style="font-size: 0.8rem; color: #444;">INTEL_SOURCE: DISTRICT_ARCHIVE_2026</p>
        </div>
    </div>

    <script>
        const cmdInput = document.getElementById('cmd');
        const output = document.getElementById('output');
        let localDb = [];

        function printToConsole(text) {
            const line = document.createElement('div');
            line.innerHTML = `> ${text}`;
            output.appendChild(line);
            output.scrollTop = output.scrollHeight;
        }

        async function initDb() {
            try {
                const manifestResponse = await fetch('manifest.json');
                const files = await manifestResponse.json();
                
                for (const file of files) {
                    try {
                        const res = await fetch(file);
                        if (!res.ok) continue;
                        let rawData = await res.json();

                        // --- SMART LOADER ENGINE ---
                        rawData.forEach(row => {
                            try {
                                if (file.toLowerCase().includes('chawkidar')) {
                                    // Handle Double-Column OCR
                                    if (row["__EMPTY_2"]) pushToDb(row["__EMPTY_2"], row["__EMPTY_3"], "Sector A", "Security (Chawkidar)", row["__EMPTY_1"]);
                                    if (row["__EMPTY_6"] || row["__EMPTY_7"]) pushToDb(row["__EMPTY_6"], row["__EMPTY_7"], "Sector B", "Security (Chawkidar)", row["__EMPTY_5"]);
                                } 
                                else if (file.toLowerCase().includes('seed')) {
                                    if (row["__EMPTY_4"]) pushToDb(row["__EMPTY_4"], row["__EMPTY_5"], row["__EMPTY_7"] || row["__EMPTY_9"], "Agriculture (Seed)", row["__EMPTY_6"]);
                                } 
                                else if (file.toLowerCase().includes('pdmc')) {
                                    // Deep Scan for messy image-data
                                    let n = row["__EMPTY_4"] || row["__EMPTY_5"] || row["__EMPTY_9"];
                                    let v = row["__EMPTY_18"] || row["__EMPTY_20"] || row["__EMPTY_23"] || "Unknown";
                                    if (n && String(n).length > 3) pushToDb(n, row["__EMPTY_5"] || "N/A", v, "Agriculture (PDMC)", "REC-FILE");
                                } 
                                else {
                                    // Default Database Structure
                                    pushToDb(row["Owner Name"] || row["Name"], row["Father Name"] || row["Father"], row["Village"], row["Vehicle Category"] || "Registry", row["Registration No"]);
                                }
                            } catch(e) { /* Skip corrupted rows */ }
                        });
                        printToConsole(`LOADED: ${file}`);
                    } catch(err) { printToConsole(`FILE_SKIP: ${file}`); }
                }
                printToConsole(`TOTAL_RECORDS: ${localDb.length}`);
            } catch (e) { printToConsole("CRITICAL: MANIFEST_NOT_FOUND."); }
        }

        function pushToDb(name, father, village, role, id) {
            if (!name || name === "Naw•" || name === "Name") return;
            localDb.push(sanitizeEntry({
                "Name": name,
                "Father": father || "N/A",
                "Village": village || "N/A",
                "Role": role || "Registry",
                "ID": id || "N/A"
            }));
        }

        function sanitizeEntry(obj) {
            const corrections = { "TUDf/": "TUDU", "SORER": "SOREN", "SOREO": "SOREN", "MARAI4DI": "MARANDI", "KISKV": "KISKU", "0": "O", "5": "S" };
            for (let k in obj) {
                if (obj[k]) {
                    let val = String(obj[k]).toUpperCase();
                    for (let err in corrections) val = val.split(err).join(corrections[err]);
                    obj[k] = val.trim();
                }
            }
            return obj;
        }

        cmdInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const val = cmdInput.value.trim();
                if(val) processCommand(val);
                cmdInput.value = '';
            }
        });

        function processCommand(rawInput) {
            const parts = rawInput.toLowerCase().split(' ');
            const cmd = parts[0];
            const arg = parts.slice(1).join(' ');
            printToConsole(`<span style="color:#444">${rawInput}</span>`);

            if (cmd === 'search') {
                const res = localDb.filter(p => p.Name.toLowerCase().includes(arg) || p.Father.toLowerCase().includes(arg));
                renderResults(res);
            } else if (cmd === 'filter') {
                const res = localDb.filter(p => p.Village.toLowerCase().includes(arg));
                renderResults(res);
            } else if (cmd === 'track') {
                const sub = localDb.find(p => p.Name.toLowerCase().includes(arg));
                if (!sub) return printToConsole("NO_MATCH.");
                printToConsole(`TRACKING_LINEAGE: ${sub.Father}`);
                localDb.filter(p => p.Father === sub.Father && p.Name !== sub.Name).forEach(r => printToConsole(`[CONNECTED] ${r.Name} | ${r.Village}`));
            } else if (cmd === 'clear') { output.innerHTML = ''; }
        }

        function renderResults(res) {
            if (res.length === 0) return printToConsole("NO_RESULTS.");
            res.forEach(p => {
                const div = document.createElement('div');
                div.className = 'subject-card';
                div.innerHTML = `${p.Name} | ${p.Village} <span style="font-size:0.7rem; color:#444;">[${p.Role}]</span>`;
                div.onclick = () => openDossier(p);
                output.appendChild(div);
            });
        }

        function openDossier(p) {
            document.getElementById('d-name').innerText = p.Name;
            document.getElementById('d-father').innerText = p.Father;
            document.getElementById('d-loc').innerText = p.Village;
            document.getElementById('d-role').innerText = p.Role;
            document.getElementById('d-id').innerText = p.ID;
            document.getElementById('dossier-overlay').style.display = 'flex';
        }

        function closeDossier() { document.getElementById('dossier-overlay').style.display = 'none'; }
        
        initDb();
    </script>
</body>
</html>
