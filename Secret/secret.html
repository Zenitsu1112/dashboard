<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL_ACCESS // DEFAULTER_DATABASE</title>
    <style>
        :root {
            --neon-green: #00ff41;
            --dark-bg: #050505;
            --terminal-font: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--neon-green);
            font-family: var(--terminal-font);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* CRT Scanline Effect */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 10;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        #output {
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 20px;
            white-space: pre-wrap;
            line-height: 1.6;
            scrollbar-width: none;
        }
        #output::-webkit-scrollbar { display: none; }

        .input-area {
            display: flex;
            border-top: 1px solid #113311;
            padding-top: 10px;
            z-index: 20;
        }

        .prompt { margin-right: 10px; user-select: none; color: #555; }

        #cmd {
            background: transparent;
            border: none;
            color: var(--neon-green);
            font-family: var(--terminal-font);
            font-size: 1rem;
            flex-grow: 1;
            outline: none;
        }

        /* Search Results Style */
        .subject-card {
            border-left: 3px solid #113311;
            padding: 5px 15px;
            margin: 8px 0;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(0, 255, 65, 0.02);
        }
        .subject-card:hover {
            background: rgba(0, 255, 65, 0.1);
            border-left: 3px solid var(--neon-green);
        }

        /* Dossier Modal */
        #dossier-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .dossier-card {
            background: #0a0a0a;
            border: 1px solid var(--neon-green);
            width: 90%;
            max-width: 500px;
            padding: 30px;
            position: relative;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.2);
        }

        .close-btn {
            position: absolute;
            top: 10px; right: 15px;
            cursor: pointer;
            color: var(--neon-green);
            font-weight: bold;
        }

        .status-tag {
            padding: 2px 10px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-left: 10px;
            background: #700; color: #fff;
        }

        hr { border: 0; border-top: 1px solid #222; margin: 15px 0; }
    </style>
</head>
<body>

    <div id="output">
[ DATABASE_ONLINE ]
[ ACCESS_LEVEL: NIMO ]
[ TYPE 'HELP' FOR PROTOCOLS ]
-----------------------------------------------------------
    </div>

    <div class="input-area">
        <span class="prompt">nimo@bunker:~$</span>
        <input type="text" id="cmd" autofocus autocomplete="off">
    </div>

    <div id="dossier-overlay">
        <div class="dossier-card">
            <span class="close-btn" onclick="closeDossier()">[ X ]</span>
            <div style="margin-bottom: 20px;">
                <h2 id="d-name" style="display:inline; margin:0;"></h2>
                <span class="status-tag">ACTIVE_DEFAULTER</span>
            </div>
            <p><strong>REGISTRATION:</strong> <span id="d-reg"></span></p>
            <p><strong>VEHICLE CAT:</strong> <span id="d-cat"></span></p>
            <p><strong>ASSOCIATE:</strong> <span id="d-father"></span></p>
            <hr>
            <p><strong>TOTAL TAX OWED:</strong> ₹<span id="d-total" style="color: #ff4d4d;"></span></p>
            <p><strong>ARREARS PERIOD:</strong> <span id="d-period"></span></p>
            <p><strong>WEIGHT (GVW/ULW):</strong> <span id="d-weight"></span></p>
        </div>
    </div>

    <script>
        const cmdInput = document.getElementById('cmd');
        const output = document.getElementById('output');
        let localDb = [];

        // Load JSON Database
        async function initDb() {
            try {
                const response = await fetch('database.json');
                localDb = await response.json();
                printToConsole(`SYNC_SUCCESS: ${localDb.length} IDENTITIES INDEXED.`);
            } catch (e) {
                printToConsole("CRITICAL_ERROR: database.json NOT ACCESSIBLE.");
            }
        }
        initDb();

        cmdInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const val = cmdInput.value.trim();
                if(val) processCommand(val);
                cmdInput.value = '';
            }
        });

        function printToConsole(text) {
            const line = document.createElement('div');
            line.innerHTML = `> ${text}`;
            output.appendChild(line);
            output.scrollTop = output.scrollHeight;
        }

        function processCommand(rawInput) {
            const input = rawInput.toLowerCase();
            const parts = input.split(' ');
            const command = parts[0];
            const arg = parts.slice(1).join(' ');

            printToConsole(`<span style="color:#444">${rawInput}</span>`);

            if (command === 'help') {
                printToConsole("COMMANDS: LIST, SEARCH [name/reg], FILTER [key]:[val], CLEAR");
                printToConsole("FILTER KEYS: name, reg, category, father");
                printToConsole("EXAMPLE: 'filter category:hgv'");
            } 
            
            else if (command === 'search') {
                const filtered = localDb.filter(p => 
                    (p["Owner Name"] && p["Owner Name"].toLowerCase().includes(arg)) ||
                    (p["Registration No"] && p["Registration No"].toLowerCase().includes(arg))
                );
                renderResults(filtered);
            } 

            else if (command === 'filter') {
                if (!arg.includes(':')) {
                    printToConsole("USAGE: filter [key]:[val] (e.g., filter category:hgv)");
                    return;
                }
                const [key, val] = arg.split(':').map(s => s.trim().toLowerCase());
                
                // Map shortcut names to JSON headers
                let searchKey = "";
                if (key === 'name') searchKey = 'Owner Name';
                else if (key === 'reg') searchKey = 'Registration No';
                else if (key === 'category' || key === 'occupation') searchKey = 'Vehicle Category';
                else if (key === 'father') searchKey = 'Father Name';
                else searchKey = key; // Fallback to direct key name

                const filtered = localDb.filter(p => 
                    p[searchKey] && p[searchKey].toString().toLowerCase().includes(val)
                );
                
                printToConsole(`SHORTLISTING ${searchKey.toUpperCase()} FOR "${val.toUpperCase()}"...`);
                renderResults(filtered);
            }

            else if (command === 'list') {
                renderResults(localDb.slice(0, 50));
                printToConsole("...[LIST TRUNCATED TO 50 RESULTS]");
            }
            
            else if (command === 'clear') {
                output.innerHTML = '[ TERMINAL_RESET ]<br>---';
            }
            
            else {
                printToConsole(`UNKNOWN_PROTOCOL: ${command}`);
            }
        }

        function renderResults(results) {
            if (results.length === 0) {
                printToConsole("ZERO_MATCHES_FOUND.");
                return;
            }
            results.forEach(p => {
                const div = document.createElement('div');
                div.className = 'subject-card';
                div.innerHTML = `[${p["Registration No"]}] ${p["Owner Name"]} -- ${p["Vehicle Category"]}`;
                div.onclick = () => openDossier(p["Registration No"]);
                output.appendChild(div);
            });
            output.scrollTop = output.scrollHeight;
        }

        function openDossier(regNo) {
            const p = localDb.find(x => x["Registration No"] === regNo);
            if (!p) return;

            document.getElementById('d-name').innerText = p["Owner Name"];
            document.getElementById('d-reg').innerText = p["Registration No"];
            document.getElementById('d-cat').innerText = p["Vehicle Category"];
            document.getElementById('d-father').innerText = p["Father Name"] || "N/A";
            document.getElementById('d-total').innerText = p["Total Tax Amount"];
            document.getElementById('d-period').innerText = `${p["Arrear from"]} to ${p["Arrear upto"]}`;
            document.getElementById('d-weight').innerText = `${p["GVW"]} / ${p["ULW"]} KG`;

            document.getElementById('dossier-overlay').style.display = 'flex';
        }

        function closeDossier() {
            document.getElementById('dossier-overlay').style.display = 'none';
        }
    </script>
</body>
</html>
